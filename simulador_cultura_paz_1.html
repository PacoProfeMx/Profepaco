<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador – Promover la Cultura de Paz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Merriweather:wght@400;700&display=swap');

  :root {
    --azul:        #1565C0;
    --azul-medio:  #1E88E5;
    --azul-claro:  #BBDEFB;
    --azul-suave:  #E3F2FD;
    --teal:        #00695C;
    --teal-claro:  #E0F2F1;
    --naranja:     #E65100;
    --naranja-claro:#FFF3E0;
    --gris:        #37474F;
    --gris-medio:  #607D8B;
    --gris-claro:  #ECEFF1;
    --blanco:      #FFFFFF;
    --sombra:      0 4px 20px rgba(0,0,0,0.10);
    --sombra-lg:   0 8px 32px rgba(0,0,0,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #E3F2FD 0%, #E0F2F1 50%, #F1F8E9 100%);
    min-height: 100vh;
    color: var(--gris);
  }

  /* ───── PANTALLA BIENVENIDA ───── */
  #pantalla-inicio {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .tarjeta-inicio {
    background: var(--blanco);
    border-radius: 24px;
    box-shadow: var(--sombra-lg);
    padding: 48px 40px 40px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    animation: aparecer 0.6s ease;
  }

  .icono-inicio {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--azul), var(--teal));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 36px;
  }

  .tarjeta-inicio h1 {
    font-family: 'Merriweather', serif;
    font-size: 1.65rem;
    color: var(--azul);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .tarjeta-inicio .subtitulo {
    color: var(--gris-medio);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  .badges {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .badge {
    background: var(--azul-suave);
    color: var(--azul);
    border: 1px solid var(--azul-claro);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .campo-nombre label {
    display: block;
    font-weight: 700;
    color: var(--gris);
    margin-bottom: 8px;
    font-size: 0.95rem;
    text-align: left;
  }

  .campo-nombre input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--gris-claro);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--gris);
    outline: none;
    transition: border-color 0.2s;
  }

  .campo-nombre input:focus { border-color: var(--azul-medio); }

  .btn-primario {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, var(--azul), var(--teal));
    color: var(--blanco);
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(21,101,192,0.35);
  }
  .btn-primario:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(21,101,192,0.45); }
  .btn-primario:active { transform: translateY(0); }

  /* ───── PANTALLA EXAMEN ───── */
  #pantalla-examen { display: none; min-height: 100vh; padding: 20px; }

  .examen-contenedor { max-width: 720px; margin: 0 auto; }

  .cabecera-examen {
    background: var(--blanco);
    border-radius: 18px;
    box-shadow: var(--sombra);
    padding: 18px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .info-alumno { font-weight: 700; color: var(--azul); font-size: 0.95rem; }
  .info-alumno span { color: var(--gris); font-weight: 400; font-size: 0.85rem; display: block; }

  .progreso-texto { font-weight: 800; color: var(--teal); font-size: 1rem; }

  .barra-progreso-wrap {
    width: 100%;
    background: var(--gris-claro);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
    margin-top: 10px;
  }
  .barra-progreso-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--azul), var(--teal));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .tarjeta-pregunta {
    background: var(--blanco);
    border-radius: 20px;
    box-shadow: var(--sombra-lg);
    padding: 36px 32px 28px;
    animation: deslizar 0.4s ease;
  }

  .etiqueta-formato {
    display: inline-block;
    background: var(--azul-suave);
    color: var(--azul);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  .num-pregunta {
    font-size: 0.82rem;
    color: var(--gris-medio);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .texto-pregunta {
    font-family: 'Merriweather', serif;
    font-size: 1.05rem;
    color: var(--gris);
    line-height: 1.7;
    margin-bottom: 26px;
  }

  .opciones { display: flex; flex-direction: column; gap: 12px; }

  .opcion {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 2px solid var(--gris-claro);
    border-radius: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    background: #FAFAFA;
  }
  .opcion:hover:not(.bloqueada) {
    border-color: var(--azul-medio);
    background: var(--azul-suave);
    transform: translateX(4px);
  }

  .letra-opcion {
    min-width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--gris-claro);
    color: var(--gris-medio);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 0.88rem;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }

  .texto-opcion { font-size: 0.95rem; line-height: 1.5; padding-top: 5px; }

  .opcion.correcta  { border-color: #43A047; background: #E8F5E9; }
  .opcion.correcta .letra-opcion { background: #43A047; color: #fff; }

  .opcion.incorrecta { border-color: #EF5350; background: #FFEBEE; }
  .opcion.incorrecta .letra-opcion { background: #EF5350; color: #fff; }

  .opcion.bloqueada { cursor: default; }
  .opcion.seleccionada { border-color: var(--azul); background: var(--azul-suave); }
  .opcion.seleccionada .letra-opcion { background: var(--azul); color: #fff; }

  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 14px;
    font-size: 0.93rem;
    line-height: 1.6;
    display: none;
    animation: aparecer 0.3s ease;
  }
  .feedback.correcto  { background: #E8F5E9; border-left: 4px solid #43A047; color: #2E7D32; }
  .feedback.incorrecto{ background: var(--naranja-claro); border-left: 4px solid var(--naranja); color: var(--naranja); }
  .feedback .icono-feedback { font-size: 1.1rem; margin-right: 6px; }

  .btn-siguiente {
    display: none;
    margin-top: 24px;
    padding: 15px 32px;
    background: linear-gradient(135deg, var(--teal), var(--azul));
    color: var(--blanco);
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(0,105,92,0.35);
    float: right;
  }
  .btn-siguiente:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,105,92,0.45); }
  .clearfix::after { content:''; display:table; clear:both; }

  /* ───── PANTALLA RESULTADOS ───── */
  #pantalla-resultados { display: none; min-height: 100vh; padding: 20px; }

  .resultados-contenedor {
    max-width: 580px;
    margin: 0 auto;
    animation: aparecer 0.6s ease;
  }

  .tarjeta-resultado {
    background: var(--blanco);
    border-radius: 24px;
    box-shadow: var(--sombra-lg);
    padding: 44px 36px 36px;
    text-align: center;
  }

  .emoji-resultado { font-size: 64px; margin-bottom: 16px; display: block; }

  .tarjeta-resultado h2 {
    font-family: 'Merriweather', serif;
    color: var(--azul);
    font-size: 1.6rem;
    margin-bottom: 6px;
  }

  .nombre-resultado {
    color: var(--teal);
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 28px;
  }

  .estadisticas {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    border-radius: 16px;
    padding: 18px 10px;
    text-align: center;
  }
  .stat-card.correctas   { background: #E8F5E9; }
  .stat-card.incorrectas { background: #FFEBEE; }
  .stat-card.porcentaje  { background: var(--azul-suave); }

  .stat-numero {
    font-size: 2rem;
    font-weight: 900;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-card.correctas   .stat-numero { color: #2E7D32; }
  .stat-card.incorrectas .stat-numero { color: #EF5350; }
  .stat-card.porcentaje  .stat-numero { color: var(--azul); }

  .stat-label { font-size: 0.8rem; font-weight: 700; color: var(--gris-medio); text-transform: uppercase; letter-spacing: 0.4px; }

  .barra-resultado-wrap {
    background: var(--gris-claro);
    border-radius: 10px;
    height: 14px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .barra-resultado-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--azul), var(--teal));
    transition: width 1s ease;
  }
  .porcentaje-label { font-size: 0.82rem; color: var(--gris-medio); text-align: right; margin-bottom: 24px; }

  .mensaje-motivador {
    background: linear-gradient(135deg, var(--azul-suave), var(--teal-claro));
    border-radius: 14px;
    padding: 18px 22px;
    font-size: 0.97rem;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .btn-reiniciar {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--azul), var(--teal));
    color: var(--blanco);
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(21,101,192,0.35);
  }
  .btn-reiniciar:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(21,101,192,0.45); }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes deslizar {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 520px) {
    .tarjeta-inicio, .tarjeta-pregunta, .tarjeta-resultado { padding: 28px 20px 22px; }
    .tarjeta-inicio h1 { font-size: 1.35rem; }
    .texto-pregunta { font-size: 0.97rem; }
    .estadisticas { grid-template-columns: 1fr 1fr; }
    .stat-card.porcentaje { grid-column: span 2; }
    .cabecera-examen { flex-direction: column; align-items: flex-start; }
    .btn-siguiente { float: none; width: 100%; }
  }
</style>
</head>
<body>

<!-- ═══════════════════ INICIO ═══════════════════ -->
<div id="pantalla-inicio">
  <div class="tarjeta-inicio">
    <div class="icono-inicio">☮️</div>
    <h1>Promover la Cultura de Paz</h1>
    <p class="subtitulo">Simulador de evaluación de conocimientos</p>
    <div class="badges">
      <span class="badge">📋 30 preguntas</span>
      <span class="badge">⏱ A tu ritmo</span>
      <span class="badge">📊 Resultados al final</span>
    </div>
    <div class="campo-nombre">
      <label for="input-nombre">👤 Nombre del estudiante</label>
      <input type="text" id="input-nombre" placeholder="Escribe tu nombre completo…" autocomplete="off">
    </div>
    <button class="btn-primario" onclick="iniciarSimulador()">🚀 Iniciar simulador</button>
  </div>
</div>

<!-- ═══════════════════ EXAMEN ═══════════════════ -->
<div id="pantalla-examen">
  <div class="examen-contenedor">
    <div class="cabecera-examen">
      <div>
        <div class="info-alumno" id="cab-nombre">Estudiante</div>
        <span id="cab-sub">Simulador · Cultura de Paz</span>
      </div>
      <div class="progreso-texto" id="cab-progreso">Pregunta 1 / 30</div>
      <div class="barra-progreso-wrap" style="flex-basis:100%">
        <div class="barra-progreso-fill" id="barra" style="width:3.3%"></div>
      </div>
    </div>

    <div class="tarjeta-pregunta" id="tarjeta-pregunta">
      <div class="etiqueta-formato" id="etiqueta-formato">Cuestionamiento directo</div>
      <div class="num-pregunta" id="num-pregunta">Pregunta 1 de 30</div>
      <div class="texto-pregunta" id="texto-pregunta"></div>
      <div class="opciones" id="opciones"></div>
      <div class="feedback" id="feedback"></div>
      <div class="clearfix">
        <button class="btn-siguiente" id="btn-siguiente" onclick="siguientePregunta()">Siguiente pregunta →</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════ RESULTADOS ═══════════════════ -->
<div id="pantalla-resultados">
  <div class="resultados-contenedor">
    <div class="tarjeta-resultado">
      <span class="emoji-resultado" id="emoji-res">🏆</span>
      <h2>¡Examen completado!</h2>
      <div class="nombre-resultado" id="res-nombre"></div>
      <div class="estadisticas">
        <div class="stat-card correctas">
          <span class="stat-numero" id="res-correctas">0</span>
          <div class="stat-label">✅ Correctas</div>
        </div>
        <div class="stat-card incorrectas">
          <span class="stat-numero" id="res-incorrectas">0</span>
          <div class="stat-label">❌ Incorrectas</div>
        </div>
        <div class="stat-card porcentaje">
          <span class="stat-numero" id="res-pct">0%</span>
          <div class="stat-label">🎯 Aciertos</div>
        </div>
      </div>
      <div class="barra-resultado-wrap">
        <div class="barra-resultado-fill" id="barra-res" style="width:0%"></div>
      </div>
      <div class="porcentaje-label" id="pct-label"></div>
      <div class="mensaje-motivador" id="mensaje-motivador"></div>
      <button class="btn-reiniciar" onclick="reiniciar()">🔄 Volver a intentar</button>
    </div>
  </div>
</div>

<script>
const preguntas = [
  // 1
  {
    tipo: "Cuestionamiento directo",
    texto: "¿Con qué organización internacional colaboró la Secretaría de Educación Pública para elaborar el fichero 'Promover la Cultura de Paz'?",
    opciones: [
      "A) Con la Organización Mundial de la Salud (OMS).",
      "B) Con la UNESCO y su programa de educación para el desarrollo sostenible.",
      "C) Con el Fondo de las Naciones Unidas para la Infancia (UNICEF).",
      "D) Con la Comisión Interamericana de Derechos Humanos (CIDH)."
    ],
    correcta: 2,
    feedback: "El fichero fue elaborado de acuerdo con la UNICEF, como un proceso que permite el desarrollo de conocimientos, capacidades, actitudes y valores en las personas para resolver conflictos de manera pacífica y rechazar cualquier tipo de violencia."
  },
  // 2
  {
    tipo: "Cuestionamiento directo",
    texto: "¿Cuáles son las siete líneas temáticas que aborda el fichero 'Promover la Cultura de Paz'?",
    opciones: [
      "A) Violencia, bullying, discriminación, género, derechos, paz y participación.",
      "B) Conocimiento de derechos humanos, competencias socioemocionales, igualdad de género, valoración de la diversidad, autocuidado, toma de decisiones y participación infantil y adolescente.",
      "C) Autoestima, empatía, asertividad, resolución de conflictos, respeto, tolerancia y solidaridad.",
      "D) Educación sexual, prevención de adicciones, seguridad vial, nutrición, derechos humanos, convivencia y paz."
    ],
    correcta: 1,
    feedback: "Las siete líneas temáticas del fichero son: 1) Conocimiento, ejercicio y respeto a los derechos humanos, 2) Desarrollo de competencias socioemocionales, 3) Promoción de la igualdad de género, 4) Valoración de la diversidad, 5) Toma de decisiones para la vida, 6) Desarrollo de habilidades para la vida (Entornos escolares seguros) y 7) Participación infantil y adolescente."
  },
  // 3
  {
    tipo: "Cuestionamiento directo",
    texto: "¿Qué estructura tiene cada ficha del fichero para el personal docente?",
    opciones: [
      "A) Introducción, desarrollo, evaluación y cierre.",
      "B) Nivel, línea temática, propósito, apuntes para el personal docente, recursos, tiempo estimado, pasos a seguir (con el alumnado, entre el colectivo docente y con las familias).",
      "C) Objetivo, contenido, actividad, reflexión final y bibliografía.",
      "D) Diagnóstico, planeación, ejecución, evaluación y retroalimentación."
    ],
    correcta: 1,
    feedback: "Cada ficha contiene: nivel, línea temática, propósito, apuntes para el personal docente, recursos, tiempo estimado y pasos a seguir divididos en tres momentos: con el alumnado, entre el colectivo docente y con las familias."
  },
  // 4
  {
    tipo: "Cuestionamiento directo",
    texto: "Según los datos del Instituto Nacional para la Evaluación de la Educación (INEE 2018), ¿qué porcentaje de estudiantes de primaria declaró haber participado en situaciones de robo, daño o agresiones?",
    opciones: [
      "A) El 15.2% de los estudiantes de primaria.",
      "B) El 5.7% de secundaria solamente.",
      "C) El 8.7% de primaria y el 5.7% de secundaria.",
      "D) El 12.3% del total del alumnado de educación básica."
    ],
    correcta: 2,
    feedback: "Según el INEE 2018, el 8.7% de los estudiantes de primaria y el 5.7% de secundaria declararon haber participado en situaciones de robo, daño a las instalaciones o agresiones a compañeros."
  },
  // 5
  {
    tipo: "Completamiento",
    texto: "Las competencias socioemocionales son aquellas que permiten comprender, expresar y regular las emociones, a fin de mantener la interacción efectiva y satisfactoria en las relaciones con los demás; también dotan a las comunidades escolares de la capacidad para…",
    opciones: [
      "A) …obtener mejores calificaciones y destacar académicamente sobre sus compañeros.",
      "B) …generar respuestas más adaptativas a su entorno, con empatía, respeto y tolerancia, así como analizar las consecuencias de sus acciones.",
      "C) …memorizar contenidos curriculares y reproducirlos en exámenes estandarizados.",
      "D) …evitar cualquier tipo de conflicto y mantener una convivencia sin problemas en todo momento."
    ],
    correcta: 1,
    feedback: "Las competencias socioemocionales dotan a las comunidades de la capacidad para generar respuestas más adaptativas a su entorno, es decir, no impulsivas, con empatía, respeto y tolerancia hacia el otro, y para analizar las consecuencias de sus acciones."
  },
  // 6
  {
    tipo: "Cuestionamiento directo",
    texto: "¿Qué es la autoconciencia emocional, según el documento?",
    opciones: [
      "A) La capacidad de suprimir las emociones negativas para mantener la calma en todo momento.",
      "B) La capacidad para reconocer qué se siente en cada momento y por qué, poder pensar en una respuesta a ese sentimiento y el raciocinio de la persona.",
      "C) La habilidad de imitar las emociones de los demás para generar empatía en el grupo.",
      "D) La destreza para clasificar las emociones según su intensidad y duración."
    ],
    correcta: 1,
    feedback: "La autoconciencia emocional es la capacidad para reconocer qué se siente en cada momento y por qué se siente eso, poder pensar en una respuesta a ese sentimiento y el raciocinio de la persona. Es fundamental para la adquisición de otras competencias socioemocionales."
  },
  // 7
  {
    tipo: "Cuestionamiento directo",
    texto: "¿En qué consiste la regulación emocional, según el contenido del documento?",
    opciones: [
      "A) En eliminar las emociones desagradables para sentirse bien en todo momento.",
      "B) En expresar todas las emociones sin filtro para fomentar la autenticidad.",
      "C) En la capacidad de modificar la intensidad y duración de las emociones a fin de poder tener autocontrol, con el objetivo de afrontar emociones desagradables mediante la respiración, la relajación y la autogeneración de emociones agradables.",
      "D) En identificar las emociones de los demás y responder de forma asertiva ante ellas."

function iniciarSimulador() {
  const inp = document.getElementById("input-nombre");
  nombreAlumno = inp.value.trim();
  if (!nombreAlumno) {
    inp.style.borderColor = "#EF5350";
    inp.focus();
    return;
  }
  inp.style.borderColor = "";
  indiceActual = 0;
  respuestasCorrectas = 0;
  respondida = false;

  document.getElementById("pantalla-inicio").style.display = "none";
  document.getElementById("pantalla-examen").style.display = "block";
  document.getElementById("cab-nombre").textContent = nombreAlumno;

  mostrarPregunta();
}

function mostrarPregunta() {
  respondida = false;
  const p = preguntas[indiceActual];
  const total = preguntas.length;

  document.getElementById("cab-progreso").textContent = `Pregunta ${indiceActual + 1} / ${total}`;
  document.getElementById("barra").style.width = `${((indiceActual + 1) / total) * 100}%`;
  document.getElementById("etiqueta-formato").textContent = p.tipo;
  document.getElementById("num-pregunta").textContent = `Pregunta ${indiceActual + 1} de ${total}`;

  const textoEl = document.getElementById("texto-pregunta");
  textoEl.innerHTML = p.texto.replace(/\n/g, "<br>");

  const contenedor = document.getElementById("opciones");
  contenedor.innerHTML = "";
  p.opciones.forEach((op, i) => {
    const div = document.createElement("div");
    div.className = "opcion";
    // Quitar la letra inicial "A) B) C) D)" del texto de opción para mostrar solo la letra del círculo
    const textoOpcion = op.replace(/^[A-D]\)\s*/, "");
    div.innerHTML = `<div class="letra-opcion">${letras[i]}</div><div class="texto-opcion">${textoOpcion}</div>`;
    div.addEventListener("click", () => seleccionarOpcion(i, div));
    contenedor.appendChild(div);
  });

  const fb = document.getElementById("feedback");
  fb.style.display = "none";
  fb.className = "feedback";
  document.getElementById("btn-siguiente").style.display = "none";

  const tarjeta = document.getElementById("tarjeta-pregunta");
  tarjeta.style.animation = "none";
  void tarjeta.offsetWidth;
  tarjeta.style.animation = "deslizar 0.4s ease";
}

function seleccionarOpcion(indice, elDiv) {
  if (respondida) return;
  respondida = true;

  const p = preguntas[indiceActual];
  const opciones = document.querySelectorAll(".opcion");

  opciones.forEach(op => op.classList.add("bloqueada"));

  const fb = document.getElementById("feedback");

  if (indice === p.correcta) {
    respuestasCorrectas++;
    elDiv.classList.add("correcta");
    fb.className = "feedback correcto";
    fb.innerHTML = `<span class="icono-feedback">✅</span><strong>¡Correcto!</strong> ${p.feedback}`;
  } else {
    elDiv.classList.add("incorrecta");
    opciones[p.correcta].classList.add("correcta");
    fb.className = "feedback incorrecto";
    fb.innerHTML = `<span class="icono-feedback">❌</span><strong>Respuesta incorrecta.</strong> ${p.feedback}`;
  }

  fb.style.display = "block";

  const btnSig = document.getElementById("btn-siguiente");
  btnSig.textContent = indiceActual < preguntas.length - 1
    ? "Siguiente pregunta →"
    : "Ver mis resultados 🎯";
  btnSig.style.display = "inline-block";
}

function siguientePregunta() {
  indiceActual++;
  if (indiceActual < preguntas.length) {
    mostrarPregunta();
  } else {
    mostrarResultados();
  }
}

function mostrarResultados() {
  document.getElementById("pantalla-examen").style.display = "none";
  document.getElementById("pantalla-resultados").style.display = "block";

  const total = preguntas.length;
  const incorrectas = total - respuestasCorrectas;
  const pct = Math.round((respuestasCorrectas / total) * 100);

  document.getElementById("res-nombre").textContent = nombreAlumno;
  document.getElementById("res-correctas").textContent = respuestasCorrectas;
  document.getElementById("res-incorrectas").textContent = incorrectas;
  document.getElementById("res-pct").textContent = pct + "%";
  document.getElementById("pct-label").textContent = `${respuestasCorrectas} de ${total} preguntas correctas`;

  setTimeout(() => {
    document.getElementById("barra-res").style.width = pct + "%";
  }, 200);

  let emoji, mensaje;
  if (pct >= 90) {
    emoji = "🏆";
    mensaje = "¡Excelente! Tienes un dominio sobresaliente sobre la cultura de paz y las competencias socioemocionales. ¡Eres un promotor(a) de paz!";
  } else if (pct >= 75) {
    emoji = "🌟";
    mensaje = "¡Muy bien! Comprendes los conceptos fundamentales de la cultura de paz. Repasa los temas donde tuviste dudas para alcanzar la excelencia.";
  } else if (pct >= 60) {
    emoji = "📚";
    mensaje = "Buen esfuerzo. Vas por buen camino. Te recomendamos repasar las líneas temáticas del fichero para reforzar tu aprendizaje.";
  } else {
    emoji = "💪";
    mensaje = "¡Sigue adelante! Cada intento es una oportunidad de aprendizaje. Revisa el material sobre cultura de paz y vuelve a intentarlo. ¡Tú puedes!";
  }

  document.getElementById("emoji-res").textContent = emoji;
  document.getElementById("mensaje-motivador").textContent = mensaje;
}

function reiniciar() {
  document.getElementById("pantalla-resultados").style.display = "none";
  document.getElementById("pantalla-inicio").style.display = "flex";
  document.getElementById("input-nombre").value = "";
}

document.getElementById("input-nombre").addEventListener("keypress", (e) => {
  if (e.key === "Enter") iniciarSimulador();
});
</script>
</body>
</html>
