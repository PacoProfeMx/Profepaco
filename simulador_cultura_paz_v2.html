<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador – Promover la Cultura de Paz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Merriweather:wght@400;700&display=swap');
  :root{
    --azul:#1565C0;--azul-medio:#1E88E5;--azul-claro:#BBDEFB;--azul-suave:#E3F2FD;
    --teal:#00695C;--teal-claro:#E0F2F1;
    --verde:#2E7D32;--verde-suave:#E8F5E9;
    --naranja:#E65100;--naranja-claro:#FFF3E0;
    --gris:#37474F;--gris-medio:#607D8B;--gris-claro:#ECEFF1;
    --blanco:#FFFFFF;
    --sombra:0 4px 20px rgba(0,0,0,.10);--sombra-lg:0 8px 32px rgba(0,0,0,.14);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#E3F2FD 0%,#E0F2F1 50%,#F1F8E9 100%);min-height:100vh;color:var(--gris)}
  #pantalla-inicio{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .tarjeta-inicio{background:var(--blanco);border-radius:24px;box-shadow:var(--sombra-lg);padding:48px 40px 40px;max-width:520px;width:100%;text-align:center;animation:aparecer .6s ease}
  .icono-inicio{width:80px;height:80px;background:linear-gradient(135deg,var(--azul),var(--teal));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px}
  .tarjeta-inicio h1{font-family:'Merriweather',serif;font-size:1.65rem;color:var(--azul);line-height:1.3;margin-bottom:8px}
  .tarjeta-inicio .subtitulo{color:var(--gris-medio);font-size:.95rem;margin-bottom:28px}
  .badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
  .badge{background:var(--azul-suave);color:var(--azul);border:1px solid var(--azul-claro);border-radius:20px;padding:6px 14px;font-size:.82rem;font-weight:700}
  .campo-nombre label{display:block;font-weight:700;color:var(--gris);margin-bottom:8px;font-size:.95rem;text-align:left}
  .campo-nombre input{width:100%;padding:14px 18px;border:2px solid var(--gris-claro);border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;color:var(--gris);outline:none;transition:border-color .2s}
  .campo-nombre input:focus{border-color:var(--azul-medio)}
  .btn-primario{display:block;width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,var(--azul),var(--teal));color:var(--blanco);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(21,101,192,.35)}
  .btn-primario:hover{transform:translateY(-2px)}
  #pantalla-examen{display:none;min-height:100vh;padding:20px}
  .examen-contenedor{max-width:720px;margin:0 auto}
  .cabecera-examen{background:var(--blanco);border-radius:18px;box-shadow:var(--sombra);padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .info-alumno{font-weight:700;color:var(--azul);font-size:.95rem}
  .info-alumno span{color:var(--gris);font-weight:400;font-size:.85rem;display:block}
  .progreso-texto{font-weight:800;color:var(--teal);font-size:1rem}
  .barra-progreso-wrap{width:100%;background:var(--gris-claro);border-radius:10px;height:8px;overflow:hidden;margin-top:10px}
  .barra-progreso-fill{height:100%;background:linear-gradient(90deg,var(--azul),var(--teal));border-radius:10px;transition:width .4s ease}
  .tarjeta-pregunta{background:var(--blanco);border-radius:20px;box-shadow:var(--sombra-lg);padding:36px 32px 28px;animation:deslizar .4s ease}
  .etiqueta-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .etiqueta-formato{display:inline-block;background:var(--azul-suave);color:var(--azul);border-radius:8px;padding:4px 12px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .etiqueta-situacion{display:inline-block;background:#FFF8E1;color:#F57F17;border:1px solid #FFE082;border-radius:8px;padding:4px 12px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .num-pregunta{font-size:.82rem;color:var(--gris-medio);font-weight:700;margin-bottom:6px}
  .texto-pregunta{font-family:'Merriweather',serif;font-size:1.02rem;color:var(--gris);line-height:1.75;margin-bottom:20px}
  .situacion-box{background:var(--teal-claro);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:14px 18px;margin-bottom:20px;font-size:.92rem;line-height:1.65;color:#00352E}
  .situacion-box strong{color:var(--teal)}
  .opciones{display:flex;flex-direction:column;gap:12px}
  .opcion{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border:2px solid var(--gris-claro);border-radius:14px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;background:#FAFAFA}
  .opcion:hover:not(.bloqueada){border-color:var(--azul-medio);background:var(--azul-suave);transform:translateX(4px)}
  .letra-opcion{min-width:32px;height:32px;border-radius:50%;background:var(--gris-claro);color:var(--gris-medio);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;flex-shrink:0;transition:background .2s,color .2s}
  .texto-opcion{font-size:.94rem;line-height:1.5;padding-top:5px}
  .opcion.correcta{border-color:#43A047;background:var(--verde-suave)}
  .opcion.correcta .letra-opcion{background:#43A047;color:#fff}
  .opcion.incorrecta{border-color:#EF5350;background:#FFEBEE}
  .opcion.incorrecta .letra-opcion{background:#EF5350;color:#fff}
  .opcion.bloqueada{cursor:default}
  .feedback{margin-top:20px;padding:16px 20px;border-radius:14px;font-size:.92rem;line-height:1.6;display:none;animation:aparecer .3s ease}
  .feedback.correcto{background:var(--verde-suave);border-left:4px solid #43A047;color:var(--verde)}
  .feedback.incorrecto{background:var(--naranja-claro);border-left:4px solid var(--naranja);color:var(--naranja)}
  .btn-siguiente{display:none;margin-top:24px;padding:15px 32px;background:linear-gradient(135deg,var(--teal),var(--azul));color:var(--blanco);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(0,105,92,.35);float:right}
  .btn-siguiente:hover{transform:translateY(-2px)}
  .clearfix::after{content:'';display:table;clear:both}
  #pantalla-resultados{display:none;min-height:100vh;padding:20px}
  .resultados-contenedor{max-width:580px;margin:0 auto;animation:aparecer .6s ease}
  .tarjeta-resultado{background:var(--blanco);border-radius:24px;box-shadow:var(--sombra-lg);padding:44px 36px 36px;text-align:center}
  .emoji-resultado{font-size:64px;margin-bottom:16px;display:block}
  .tarjeta-resultado h2{font-family:'Merriweather',serif;color:var(--azul);font-size:1.6rem;margin-bottom:6px}
  .nombre-resultado{color:var(--teal);font-size:1.1rem;font-weight:700;margin-bottom:28px}
  .estadisticas{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
  .stat-card{border-radius:16px;padding:18px 10px;text-align:center}
  .stat-card.correctas{background:var(--verde-suave)}
  .stat-card.incorrectas{background:#FFEBEE}
  .stat-card.porcentaje{background:var(--azul-suave)}
  .stat-numero{font-size:2rem;font-weight:900;display:block;line-height:1;margin-bottom:4px}
  .stat-card.correctas .stat-numero{color:var(--verde)}
  .stat-card.incorrectas .stat-numero{color:#EF5350}
  .stat-card.porcentaje .stat-numero{color:var(--azul)}
  .stat-label{font-size:.8rem;font-weight:700;color:var(--gris-medio);text-transform:uppercase;letter-spacing:.4px}
  .barra-resultado-wrap{background:var(--gris-claro);border-radius:10px;height:14px;overflow:hidden;margin-bottom:6px}
  .barra-resultado-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--azul),var(--teal));transition:width 1s ease}
  .porcentaje-label{font-size:.82rem;color:var(--gris-medio);text-align:right;margin-bottom:24px}
  .mensaje-motivador{background:linear-gradient(135deg,var(--azul-suave),var(--teal-claro));border-radius:14px;padding:18px 22px;font-size:.97rem;font-weight:700;color:var(--teal);margin-bottom:24px;line-height:1.5}
  .btn-reiniciar{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,var(--azul),var(--teal));color:var(--blanco);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .15s;box-shadow:0 4px 14px rgba(21,101,192,.35)}
  .btn-reiniciar:hover{transform:translateY(-2px)}
  @keyframes aparecer{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes deslizar{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @media(max-width:520px){
    .tarjeta-inicio,.tarjeta-pregunta,.tarjeta-resultado{padding:28px 20px 22px}
    .tarjeta-inicio h1{font-size:1.35rem}
    .estadisticas{grid-template-columns:1fr 1fr}
    .stat-card.porcentaje{grid-column:span 2}
    .cabecera-examen{flex-direction:column;align-items:flex-start}
    .btn-siguiente{float:none;width:100%}
  }
</style>
</head>
<body>

<div id="pantalla-inicio">
  <div class="tarjeta-inicio">
    <div class="icono-inicio">☮️</div>
    <h1>Promover la Cultura de Paz</h1>
    <p class="subtitulo">Simulador de evaluación de conocimientos</p>
    <div class="badges">
      <span class="badge">📋 40 preguntas</span>
      <span class="badge">🏫 Situaciones de aula</span>
      <span class="badge">📊 Resultados al final</span>
    </div>
    <div class="campo-nombre">
      <label for="input-nombre">👤 Nombre del estudiante</label>
      <input type="text" id="input-nombre" placeholder="Escribe tu nombre completo…" autocomplete="off">
    </div>
    <button class="btn-primario" onclick="iniciarSimulador()">🚀 Iniciar simulador</button>
  </div>
</div>

<div id="pantalla-examen">
  <div class="examen-contenedor">
    <div class="cabecera-examen">
      <div>
        <div class="info-alumno" id="cab-nombre">Estudiante</div>
        <span id="cab-sub">Simulador · Cultura de Paz</span>
      </div>
      <div class="progreso-texto" id="cab-progreso">Pregunta 1 / 40</div>
      <div class="barra-progreso-wrap" style="flex-basis:100%">
        <div class="barra-progreso-fill" id="barra" style="width:2.5%"></div>
      </div>
    </div>
    <div class="tarjeta-pregunta" id="tarjeta-pregunta">
      <div class="etiqueta-wrap" id="etiqueta-wrap"></div>
      <div class="num-pregunta" id="num-pregunta"></div>
      <div class="texto-pregunta" id="texto-pregunta"></div>
      <div class="situacion-box" id="situacion-box" style="display:none"></div>
      <div class="opciones" id="opciones"></div>
      <div class="feedback" id="feedback"></div>
      <div class="clearfix">
        <button class="btn-siguiente" id="btn-siguiente" onclick="siguientePregunta()">Siguiente pregunta →</button>
      </div>
    </div>
  </div>
</div>

<div id="pantalla-resultados">
  <div class="resultados-contenedor">
    <div class="tarjeta-resultado">
      <span class="emoji-resultado" id="emoji-res">🏆</span>
      <h2>¡Examen completado!</h2>
      <div class="nombre-resultado" id="res-nombre"></div>
      <div class="estadisticas">
        <div class="stat-card correctas"><span class="stat-numero" id="res-correctas">0</span><div class="stat-label">✅ Correctas</div></div>
        <div class="stat-card incorrectas"><span class="stat-numero" id="res-incorrectas">0</span><div class="stat-label">❌ Incorrectas</div></div>
        <div class="stat-card porcentaje"><span class="stat-numero" id="res-pct">0%</span><div class="stat-label">🎯 Aciertos</div></div>
      </div>
      <div class="barra-resultado-wrap"><div class="barra-resultado-fill" id="barra-res" style="width:0%"></div></div>
      <div class="porcentaje-label" id="pct-label"></div>
      <div class="mensaje-motivador" id="mensaje-motivador"></div>
      <button class="btn-reiniciar" onclick="reiniciar()">🔄 Volver a intentar</button>
    </div>
  </div>
</div>

<script>
// Correctas: A=10, B=10, C=10, D=10
const preguntas=[
  // 1 correcta C
  {tipo:"Cuestionamiento directo",sit:false,
   txt:"¿Cuál de las siguientes afirmaciones describe con mayor precisión el propósito del fichero 'Promover la Cultura de Paz'?",
   ops:["Proporcionar a los docentes estrategias para aumentar el rendimiento académico en matemáticas y español.",
        "Ofrecer actividades recreativas para ocupar el tiempo libre del alumnado y reducir conflictos.",
        "Desarrollar en las personas conocimientos, capacidades, actitudes y valores que les permitan resolver conflictos de manera pacífica y rechazar cualquier tipo de violencia.",
        "Establecer sanciones claras para quienes incumplan las normas de convivencia escolar."],
   ok:2,fb:"El fichero fue elaborado de acuerdo con la UNICEF como un proceso que permite el desarrollo de conocimientos, capacidades, actitudes y valores en las personas para resolver conflictos de manera pacífica, rechazar cualquier tipo de violencia y tratar de generar condiciones hacia la paz, tanto a nivel personal como social."},

  // 2 SITUACIÓN correcta D
  {tipo:"Situación en el aula",sit:true,
   txt:"Lee la situación y elige la respuesta más precisa:",
   stxt:"La maestra Adriana nota que sus alumnos de 1.° grado no tienen palabras para describir lo que sienten. Diseña una actividad: muestra recortes de rostros con diferentes expresiones (enojo, alegría, tristeza, miedo) y pide a cada alumno que señale el que se parece a cómo se siente hoy, que lo nombre y que diga algo que lo haga sentir así.",
   ops:["La maestra realiza una actividad de arte visual sin propósito pedagógico definido.",
        "La maestra evalúa el estado emocional de sus alumnos para elaborar un reporte para los padres.",
        "La maestra aplica estrategias para identificar problemas de salud mental en el grupo.",
        "La maestra desarrolla la autoconciencia emocional: ayuda a los alumnos a reconocer qué sienten en cada momento y por qué, lo que es el primer paso para adquirir otras competencias socioemocionales."],
   ok:3,fb:"La autoconciencia emocional es la capacidad para reconocer qué se siente en cada momento y por qué se siente eso. Es fundamental para la adquisición de otras competencias socioemocionales. Un primer paso para desarrollar estas competencias es que los alumnos tengan conciencia de sus emociones, las reconozcan y aprendan a expresarlas de forma asertiva."},

  // 3 correcta A
  {tipo:"Cuestionamiento directo",sit:false,
   txt:"¿Qué diferencia hay entre el 'sexo' y el 'género' según el documento?",
   ops:["El sexo refiere las diferencias biológicas entre mujeres y hombres; el género es una construcción social y cultural que asigna roles, funciones y características según el sexo de la persona.",
        "El sexo es una construcción cultural variable y el género es la diferencia biológica inmutable entre las personas.",
        "Ambos conceptos son sinónimos que hacen referencia a las mismas características de las personas.",
        "El sexo determina las capacidades intelectuales y el género determina las habilidades físicas de cada persona."],
   ok:0,fb:"El concepto de género y roles hace referencia a las diferencias biológicas entre mujeres y hombres (sexo), en tanto que el género es lo que el género ha construido social y culturalmente, asignando funciones y características consideradas 'apropiadas' por la sociedad de acuerdo al sexo de la persona."},

  // 4 SITUACIÓN correcta B
  {tipo:"Situación en el aula",sit:true,
   txt:"Lee la situación y selecciona la interpretación más adecuada:",
   stxt:"El maestro Omar trabaja con su grupo de 5.° grado los estereotipos de género. Divide al grupo en equipos y les entrega tarjetas con profesiones (médico, enfermera, piloto, secretaria, ingeniero, maestra). Pide que las clasifiquen como 'de hombre' o 'de mujer'. Luego reflexionan: ¿por qué clasificamos así?, ¿las personas nacen sabiendo qué profesión deben tener?, ¿estas ideas limitan o amplían las posibilidades de las personas?",
   ops:["El maestro refuerza los estereotipos de género al pedirles que los clasifiquen como 'de hombre' o 'de mujer'.",
        "El maestro trabaja correctamente los estereotipos de género: al hacer visible la clasificación social y reflexionar sobre ella, promueve que los alumnos cuestionen roles construidos culturalmente que obstaculizan el desarrollo de sus potencialidades.",
        "El maestro introduce contenidos ideológicos que no le corresponde abordar en educación primaria.",
        "El maestro debe esperar que los alumnos lleguen a secundaria para trabajar estos temas con madurez suficiente."],
   ok:1,fb:"Los estereotipos de género son las características y actividades asignadas a cada persona dependiendo de su sexo; son una construcción social y cultural. Son un problema porque obstaculizan el desarrollo de las potencialidades de las personas al predeterminar lo que se espera de ellas. La escuela es el espacio idóneo para reflexionar críticamente sobre ellos."},

  // 5 correcta D
  {tipo:"Cuestionamiento directo",sit:false,
   txt:"¿Cuál es la principal razón por la que el trabajo en competencias socioemocionales no es suficiente por sí solo para eliminar la discriminación y la violencia, según el documento?",
   ops:["Porque las competencias socioemocionales solo se desarrollan efectivamente en la adolescencia y no en la infancia.",
        "Porque los docentes no tienen la formación adecuada para enseñar competencias socioemocionales.",
        "Porque las familias se oponen a que la escuela aborde temas socioemocionales con sus hijos.",
        "Porque la discriminación y la violencia se originan en condiciones de pobreza y desigualdad social que la escuela no puede resolver sola, aunque puede trabajar otros aspectos que la contrarresten."],
   ok:3,fb:"Es importante reconocer que el trabajo con las competencias socioemocionales no es suficiente para eliminar la discriminación. La violencia origina en las condiciones de pobreza y de discriminación sufrida por distintos grupos de población, cuyas condiciones familiares los colocan en situaciones de vulnerabilidad. Ante esto, la escuela también tiene que trabajar en otros aspectos que los contrarresten."},

  // 6 SITUACIÓN correcta A
  {tipo:"Situación en el aula",sit:true,
   txt:"Lee la situación y elige la respuesta correcta:",
   stxt:"La maestra Fernanda trabaja con alumnos de preescolar la ficha 'Inhalo y exhalo'. Pide a sus alumnos que tomen una piedra decorada, se sienten en círculo y practiquen: inhalan mientras sostienen la piedra, la colocan en la entrada de un laberinto, exhalan avanzando lentamente hacia la meta. Repiten el ejercicio tres veces. Luego reflexionan: '¿Cómo se sienten ahora comparado con antes?'",
   ops:["La maestra aplica correctamente la técnica de respiración para la regulación emocional: esta permite a los alumnos aprender que sentir emociones intensas es inevitable, pero que pueden elegir cómo reaccionar; la respiración reduce la impulsividad y les da tiempo para pensar antes de actuar.",
        "La maestra realiza una actividad de meditación espiritual inadecuada para el contexto educativo.",
        "La maestra utiliza material costoso (piedras) que no todos los docentes pueden conseguir fácilmente.",
        "La maestra solo hace una actividad de relajación sin relación con las competencias socioemocionales."],
   ok:0,fb:"La regulación emocional es la capacidad de modificar la intensidad y duración de las emociones para tener autocontrol de la impulsividad. Se recomienda que el personal docente ayude al alumnado a aprender a identificar, comprender y regular sus emociones de forma progresiva. Sentir las emociones es inevitable, sino que puedan elegir cómo reaccionar: no gritando, empujando ni insultando a alguien."},

  // 7 correcta C
  {tipo:"Cuestionamiento directo",sit:false,
   txt:"Según el INEE 2018, ¿qué porcentaje de estudiantes de primaria y secundaria declararon haber participado en situaciones de violencia escolar?",
   ops:["El 12.3% en primaria y el 8.9% en secundaria.",
        "El 5.7% en primaria y el 8.7% en secundaria.",
        "El 8.7% en primaria y el 5.7% en secundaria.",
        "El 15.2% en primaria y el 10.4% en secundaria."],
   ok:2,fb:"De acuerdo con el Instituto Nacional para la Evaluación de la Educación (INEE), en promedio el 8.7% de los estudiantes de primaria y el 5.7% de secundaria declararon haber participado en situaciones de robo, daño a las instalaciones, intimidación, acoso escolar o peleas a compañeros."},

  // 8 SITUACIÓN correcta D
  {tipo:"Situación en el aula",sit:true,
   txt:"Lee la situación y selecciona la respuesta más adecuada:",
   stxt:"Dos alumnos de 3.° grado tienen un conflicto porque uno rompió accidentalmente el trabajo del otro. La maestra Claudia interviene así: les pide que respiren profundo, los sienta juntos con ella como adulta de apoyo, les da turnos para hablar sin interrumpirse, luego les pregunta qué soluciones proponen cada uno, y finalmente les ayuda a elegir la solución que beneficie a ambos.",
   ops:["La maestra tarda demasiado en resolver el conflicto, perdiendo tiempo valioso de clase.",
        "La maestra comete un error al no sancionar al alumno que rompió el trabajo.",
        "La maestra aplica solo los primeros pasos, pero omite el más importante: proponer soluciones.",
        "La maestra aplica correctamente los cinco pasos para resolver un conflicto de forma pacífica: calma, ayuda adulta, diálogo, propuesta de soluciones y elección de la más conveniente para todos."],
   ok:3,fb:"Educar en una cultura de paz implica practicar habilidades y valores que ayuden a los niños a enfrentar los conflictos de forma pacífica y no actos de violencia. Los cinco pasos son: A) Respirar y recobrar la calma, B) Buscar ayuda de una persona adulta, C) Usar el diálogo para escucharse entre sí, D) Proponer soluciones, E) Elegir la solución más conveniente para todos."},

  // 9 correcta B
  {tipo:"Cuestionamiento directo",sit:false,
   txt:"¿Qué distingue a la 'empatía' de la 'simpatía' como competencia socioemocional?",

let nombreAlumno="",indiceActual=0,respuestasCorrectas=0,respondida=false;
const letras=["A","B","C","D"];

function iniciarSimulador(){
  const inp=document.getElementById("input-nombre");
  nombreAlumno=inp.value.trim();
  if(!nombreAlumno){inp.style.borderColor="#EF5350";inp.focus();return;}
  inp.style.borderColor="";
  indiceActual=0;respuestasCorrectas=0;respondida=false;
  document.getElementById("pantalla-inicio").style.display="none";
  document.getElementById("pantalla-examen").style.display="block";
  document.getElementById("cab-nombre").textContent=nombreAlumno;
  mostrarPregunta();
}

function mostrarPregunta(){
  respondida=false;
  const p=preguntas[indiceActual],total=preguntas.length;
  document.getElementById("cab-progreso").textContent=`Pregunta ${indiceActual+1} / ${total}`;
  document.getElementById("barra").style.width=`${((indiceActual+1)/total)*100}%`;
  document.getElementById("num-pregunta").textContent=`Pregunta ${indiceActual+1} de ${total}`;
  const wrap=document.getElementById("etiqueta-wrap");
  wrap.innerHTML=`<span class="etiqueta-formato">${p.tipo}</span>`;
  if(p.sit) wrap.innerHTML+=`<span class="etiqueta-situacion">🏫 Situación de aula</span>`;
  document.getElementById("texto-pregunta").innerHTML=p.txt.replace(/\n/g,"<br>");
  const sb=document.getElementById("situacion-box");
  if(p.sit&&p.stxt){sb.style.display="block";sb.innerHTML=`<strong>📌 Situación:</strong> ${p.stxt}`;}
  else{sb.style.display="none";}
  const cont=document.getElementById("opciones");cont.innerHTML="";
  p.ops.forEach((op,i)=>{
    const div=document.createElement("div");div.className="opcion";
    div.innerHTML=`<div class="letra-opcion">${letras[i]}</div><div class="texto-opcion">${op}</div>`;
    div.addEventListener("click",()=>seleccionar(i,div));
    cont.appendChild(div);
  });
  const fb=document.getElementById("feedback");fb.style.display="none";fb.className="feedback";
  document.getElementById("btn-siguiente").style.display="none";
  const t=document.getElementById("tarjeta-pregunta");t.style.animation="none";void t.offsetWidth;t.style.animation="deslizar .4s ease";
}

function seleccionar(idx,elDiv){
  if(respondida)return;respondida=true;
  const p=preguntas[indiceActual];
  document.querySelectorAll(".opcion").forEach(o=>o.classList.add("bloqueada"));
  const fb=document.getElementById("feedback");
  if(idx===p.ok){
    respuestasCorrectas++;elDiv.classList.add("correcta");
    fb.className="feedback correcto";
    fb.innerHTML=`✅ <strong>¡Correcto!</strong> ${p.fb}`;
  } else {
    elDiv.classList.add("incorrecta");
    document.querySelectorAll(".opcion")[p.ok].classList.add("correcta");
    fb.className="feedback incorrecto";
    fb.innerHTML=`❌ <strong>Incorrecto.</strong> ${p.fb}`;
  }
  fb.style.display="block";
  const btn=document.getElementById("btn-siguiente");
  btn.textContent=indiceActual<preguntas.length-1?"Siguiente pregunta →":"Ver mis resultados 🎯";
  btn.style.display="inline-block";
}

function siguientePregunta(){
  indiceActual++;
  if(indiceActual<preguntas.length)mostrarPregunta();else mostrarResultados();
}

function mostrarResultados(){
  document.getElementById("pantalla-examen").style.display="none";
  document.getElementById("pantalla-resultados").style.display="block";
  const total=preguntas.length,inc=total-respuestasCorrectas,pct=Math.round((respuestasCorrectas/total)*100);
  document.getElementById("res-nombre").textContent=nombreAlumno;
  document.getElementById("res-correctas").textContent=respuestasCorrectas;
  document.getElementById("res-incorrectas").textContent=inc;
  document.getElementById("res-pct").textContent=pct+"%";
  document.getElementById("pct-label").textContent=`${respuestasCorrectas} de ${total} preguntas correctas`;
  setTimeout(()=>{document.getElementById("barra-res").style.width=pct+"%";},200);
  let e,m;
  if(pct>=90){e="🏆";m="¡Excelente! Tienes un dominio sobresaliente sobre la cultura de paz y las competencias socioemocionales. ¡Eres un promotor(a) de paz!";}
  else if(pct>=75){e="🌟";m="¡Muy bien! Comprendes los conceptos fundamentales de la cultura de paz. Repasa los temas donde tuviste dudas para alcanzar la excelencia.";}
  else if(pct>=60){e="📚";m="Buen esfuerzo. Vas por buen camino. Te recomendamos repasar las líneas temáticas del fichero para reforzar tu aprendizaje.";}
  else{e="💪";m="¡Sigue adelante! Cada intento es una oportunidad de aprendizaje. Revisa el material sobre cultura de paz y vuelve a intentarlo. ¡Tú puedes!";}
  document.getElementById("emoji-res").textContent=e;
  document.getElementById("mensaje-motivador").textContent=m;
}

function reiniciar(){
  document.getElementById("pantalla-resultados").style.display="none";
  document.getElementById("pantalla-inicio").style.display="flex";
  document.getElementById("input-nombre").value="";
}
document.getElementById("input-nombre").addEventListener("keypress",e=>{if(e.key==="Enter")iniciarSimulador();});
</script>
