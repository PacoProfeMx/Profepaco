<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador – Construyendo Equidad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Merriweather:wght@400;700&display=swap');
  :root{
    --verde:#2E7D32;--verde-medio:#43A047;--verde-claro:#C8E6C9;--verde-suave:#E8F5E9;
    --teal:#00796B;--teal-claro:#E0F2F1;
    --azul:#1565C0;--azul-claro:#E3F2FD;
    --naranja:#E65100;--naranja-claro:#FFF3E0;
    --gris:#37474F;--gris-medio:#607D8B;--gris-claro:#ECEFF1;
    --blanco:#FFFFFF;
    --sombra:0 4px 20px rgba(0,0,0,.10);--sombra-lg:0 8px 32px rgba(0,0,0,.14);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#E8F5E9 0%,#E0F2F1 50%,#E3F2FD 100%);min-height:100vh;color:var(--gris)}
  #pantalla-inicio{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .tarjeta-inicio{background:var(--blanco);border-radius:24px;box-shadow:var(--sombra-lg);padding:48px 40px 40px;max-width:520px;width:100%;text-align:center;animation:aparecer .6s ease}
  .icono-inicio{width:80px;height:80px;background:linear-gradient(135deg,var(--verde),var(--teal));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px}
  .tarjeta-inicio h1{font-family:'Merriweather',serif;font-size:1.7rem;color:var(--verde);line-height:1.3;margin-bottom:8px}
  .tarjeta-inicio .subtitulo{color:var(--gris-medio);font-size:.95rem;margin-bottom:28px}
  .badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
  .badge{background:var(--verde-suave);color:var(--verde);border:1px solid var(--verde-claro);border-radius:20px;padding:6px 14px;font-size:.82rem;font-weight:700}
  .campo-nombre label{display:block;font-weight:700;color:var(--gris);margin-bottom:8px;font-size:.95rem;text-align:left}
  .campo-nombre input{width:100%;padding:14px 18px;border:2px solid var(--gris-claro);border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;color:var(--gris);outline:none;transition:border-color .2s}
  .campo-nombre input:focus{border-color:var(--verde-medio)}
  .btn-primario{display:block;width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,var(--verde),var(--teal));color:var(--blanco);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(46,125,50,.35)}
  .btn-primario:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(46,125,50,.45)}
  #pantalla-examen{display:none;min-height:100vh;padding:20px}
  .examen-contenedor{max-width:720px;margin:0 auto}
  .cabecera-examen{background:var(--blanco);border-radius:18px;box-shadow:var(--sombra);padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .info-alumno{font-weight:700;color:var(--verde);font-size:.95rem}
  .info-alumno span{color:var(--gris);font-weight:400;font-size:.85rem;display:block}
  .progreso-texto{font-weight:800;color:var(--teal);font-size:1rem}
  .barra-progreso-wrap{width:100%;background:var(--gris-claro);border-radius:10px;height:8px;overflow:hidden;margin-top:10px}
  .barra-progreso-fill{height:100%;background:linear-gradient(90deg,var(--verde),var(--teal));border-radius:10px;transition:width .4s ease}
  .tarjeta-pregunta{background:var(--blanco);border-radius:20px;box-shadow:var(--sombra-lg);padding:36px 32px 28px;animation:deslizar .4s ease}
  .etiqueta-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .etiqueta-formato{display:inline-block;background:var(--teal-claro);color:var(--teal);border-radius:8px;padding:4px 12px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .etiqueta-situacion{display:inline-block;background:#FFF8E1;color:#F57F17;border:1px solid #FFE082;border-radius:8px;padding:4px 12px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .num-pregunta{font-size:.82rem;color:var(--gris-medio);font-weight:700;margin-bottom:6px}
  .texto-pregunta{font-family:'Merriweather',serif;font-size:1.02rem;color:var(--gris);line-height:1.75;margin-bottom:20px}
  .situacion-box{background:#FFFDE7;border-left:4px solid #F9A825;border-radius:0 12px 12px 0;padding:14px 18px;margin-bottom:20px;font-size:.92rem;line-height:1.65;color:#4E342E}
  .situacion-box strong{color:#E65100}
  .opciones{display:flex;flex-direction:column;gap:12px}
  .opcion{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border:2px solid var(--gris-claro);border-radius:14px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;background:#FAFAFA}
  .opcion:hover:not(.bloqueada){border-color:var(--verde-medio);background:var(--verde-suave);transform:translateX(4px)}
  .letra-opcion{min-width:32px;height:32px;border-radius:50%;background:var(--gris-claro);color:var(--gris-medio);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;flex-shrink:0;transition:background .2s,color .2s}
  .texto-opcion{font-size:.94rem;line-height:1.5;padding-top:5px}
  .opcion.correcta{border-color:var(--verde-medio);background:var(--verde-suave)}
  .opcion.correcta .letra-opcion{background:var(--verde-medio);color:#fff}
  .opcion.incorrecta{border-color:#EF5350;background:#FFEBEE}
  .opcion.incorrecta .letra-opcion{background:#EF5350;color:#fff}
  .opcion.bloqueada{cursor:default}
  .feedback{margin-top:20px;padding:16px 20px;border-radius:14px;font-size:.92rem;line-height:1.6;display:none;animation:aparecer .3s ease}
  .feedback.correcto{background:var(--verde-suave);border-left:4px solid var(--verde-medio);color:var(--verde)}
  .feedback.incorrecto{background:var(--naranja-claro);border-left:4px solid var(--naranja);color:var(--naranja)}
  .btn-siguiente{display:none;margin-top:24px;padding:15px 32px;background:linear-gradient(135deg,var(--teal),var(--verde));color:var(--blanco);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(0,121,107,.35);float:right}
  .btn-siguiente:hover{transform:translateY(-2px)}
  .clearfix::after{content:'';display:table;clear:both}
  #pantalla-resultados{display:none;min-height:100vh;padding:20px}
  .resultados-contenedor{max-width:580px;margin:0 auto;animation:aparecer .6s ease}
  .tarjeta-resultado{background:var(--blanco);border-radius:24px;box-shadow:var(--sombra-lg);padding:44px 36px 36px;text-align:center}
  .emoji-resultado{font-size:64px;margin-bottom:16px;display:block}
  .tarjeta-resultado h2{font-family:'Merriweather',serif;color:var(--verde);font-size:1.6rem;margin-bottom:6px}
  .nombre-resultado{color:var(--teal);font-size:1.1rem;font-weight:700;margin-bottom:28px}
  .estadisticas{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
  .stat-card{border-radius:16px;padding:18px 10px;text-align:center}
  .stat-card.correctas{background:var(--verde-suave)}
  .stat-card.incorrectas{background:#FFEBEE}
  .stat-card.porcentaje{background:var(--azul-claro)}
  .stat-numero{font-size:2rem;font-weight:900;display:block;line-height:1;margin-bottom:4px}
  .stat-card.correctas .stat-numero{color:var(--verde)}
  .stat-card.incorrectas .stat-numero{color:#EF5350}
  .stat-card.porcentaje .stat-numero{color:var(--azul)}
  .stat-label{font-size:.8rem;font-weight:700;color:var(--gris-medio);text-transform:uppercase;letter-spacing:.4px}
  .barra-resultado-wrap{background:var(--gris-claro);border-radius:10px;height:14px;overflow:hidden;margin-bottom:6px}
  .barra-resultado-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--verde),var(--teal));transition:width 1s ease}
  .porcentaje-label{font-size:.82rem;color:var(--gris-medio);text-align:right;margin-bottom:24px}
  .mensaje-motivador{background:linear-gradient(135deg,var(--verde-suave),var(--teal-claro));border-radius:14px;padding:18px 22px;font-size:.97rem;font-weight:700;color:var(--teal);margin-bottom:24px;line-height:1.5}
  .btn-reiniciar{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,var(--verde),var(--teal));color:var(--blanco);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(46,125,50,.35)}
  .btn-reiniciar:hover{transform:translateY(-2px)}
  @keyframes aparecer{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes deslizar{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @media(max-width:520px){
    .tarjeta-inicio,.tarjeta-pregunta,.tarjeta-resultado{padding:28px 20px 22px}
    .tarjeta-inicio h1{font-size:1.35rem}
    .estadisticas{grid-template-columns:1fr 1fr}
    .stat-card.porcentaje{grid-column:span 2}
    .cabecera-examen{flex-direction:column;align-items:flex-start}
    .btn-siguiente{float:none;width:100%}
  }
</style>
</head>
<body>

<div id="pantalla-inicio">
  <div class="tarjeta-inicio">
    <div class="icono-inicio">🏫</div>
    <h1>Construyendo Equidad en la Comunidad Educativa</h1>
    <p class="subtitulo">Simulador de evaluación de conocimientos</p>
    <div class="badges">
      <span class="badge">📋 40 preguntas</span>
      <span class="badge">🏫 Situaciones de aula</span>
      <span class="badge">📊 Resultados al final</span>
    </div>
    <div class="campo-nombre">
      <label for="input-nombre">👤 Nombre del estudiante</label>
      <input type="text" id="input-nombre" placeholder="Escribe tu nombre completo…" autocomplete="off">
    </div>
    <button class="btn-primario" onclick="iniciarSimulador()">🚀 Iniciar simulador</button>
  </div>
</div>

<div id="pantalla-examen">
  <div class="examen-contenedor">
    <div class="cabecera-examen">
      <div>
        <div class="info-alumno" id="cab-nombre">Estudiante</div>
        <span id="cab-sub">Simulador · Construyendo Equidad</span>
      </div>
      <div class="progreso-texto" id="cab-progreso">Pregunta 1 / 40</div>
      <div class="barra-progreso-wrap" style="flex-basis:100%">
        <div class="barra-progreso-fill" id="barra" style="width:2.5%"></div>
      </div>
    </div>
    <div class="tarjeta-pregunta" id="tarjeta-pregunta">
      <div class="etiqueta-wrap" id="etiqueta-wrap"></div>
      <div class="num-pregunta" id="num-pregunta"></div>
      <div class="texto-pregunta" id="texto-pregunta"></div>
      <div class="situacion-box" id="situacion-box" style="display:none"></div>
      <div class="opciones" id="opciones"></div>
      <div class="feedback" id="feedback"></div>
      <div class="clearfix">
        <button class="btn-siguiente" id="btn-siguiente" onclick="siguientePregunta()">Siguiente pregunta →</button>
      </div>
    </div>
  </div>
</div>

<div id="pantalla-resultados">
  <div class="resultados-contenedor">
    <div class="tarjeta-resultado">
      <span class="emoji-resultado" id="emoji-res">🏆</span>
      <h2>¡Examen completado!</h2>
      <div class="nombre-resultado" id="res-nombre"></div>
      <div class="estadisticas">
        <div class="stat-card correctas"><span class="stat-numero" id="res-correctas">0</span><div class="stat-label">✅ Correctas</div></div>
        <div class="stat-card incorrectas"><span class="stat-numero" id="res-incorrectas">0</span><div class="stat-label">❌ Incorrectas</div></div>
        <div class="stat-card porcentaje"><span class="stat-numero" id="res-pct">0%</span><div class="stat-label">🎯 Aciertos</div></div>
      </div>
      <div class="barra-resultado-wrap"><div class="barra-resultado-fill" id="barra-res" style="width:0%"></div></div>
      <div class="porcentaje-label" id="pct-label"></div>
      <div class="mensaje-motivador" id="mensaje-motivador"></div>
      <button class="btn-reiniciar" onclick="reiniciar()">🔄 Volver a intentar</button>
    </div>
  </div>
</div>

<script>
// Correctas distribuidas: A=10, B=9, C=11, D=10
const preguntas = [
  // 1 – correcta C
  { tipo:"Cuestionamiento directo", sit:false,
    txt:"¿Qué distingue a una comunidad educativa promotora de equidad de una que únicamente imparte conocimientos académicos?",
    ops:["Que cuenta con mayor presupuesto y mejores instalaciones físicas.",
         "Que aplica un reglamento estricto de convivencia validado por la SEP.",
         "Que consolida lazos afectivos, genera confianza y forma personas seguras, creativas, colaboradoras y resilientes para afrontar la adversidad.",
         "Que promueve la competencia entre alumnos como motor del rendimiento escolar."],
    ok:2, fb:"Una comunidad educativa es promotora de equidad cuando consolida lazos afectivos y genera confianza; forma personas con seguridad en sí mismas, creativas, colaboradoras y resilientes para afrontar la adversidad y salir fortalecidas." },

  // 2 – SITUACIÓN – correcta A
  { tipo:"Situación en el aula", sit:true,
    txt:"Lee la situación y elige la opción que mejor explica lo que ocurre:",
    stxt:"El maestro Luis pide a sus alumnos de 5.° grado que entrevisten a un familiar sobre algún oficio que haya marcado la historia de su familia. Al día siguiente, cada alumno comparte lo descubierto frente al grupo. Tras escuchar todos los relatos, el maestro plantea: '¿De qué manera esos oficios contribuyen a la sociedad y cómo nos pueden hacer actuar con mayor equidad?'",
    ops:["El maestro aplica correctamente la actividad inicial de una secuencia: los alumnos dialogan, expresan ideas sobre su familia y reflexionan sobre valores de equidad, dando significado real a la lectoescritura y al contexto cultural.",
         "El maestro realiza una actividad exclusiva de Ciencias Sociales para cubrir el bloque temático.",
         "El maestro evalúa el nivel socioeconómico familiar para reportarlo a la dirección.",
         "El maestro improvisó porque no contaba con planeación para esa sesión."],
    ok:0, fb:"Esta es la actividad inicial: los alumnos inician con apoyo del docente, dialogan y expresan ideas sobre situaciones de su entorno, crean productos y comparten su visión del mundo. En estas actividades leen y escriben, dando a la lectoescritura funciones significativas." },

  // 3 – correcta D
  { tipo:"Completamiento", sit:false,
    txt:"Según el texto, la autoestima es el equilibrio entre…",
    ops:["…la inteligencia emocional y la capacidad cognitiva de cada persona.",
         "…la obediencia a las normas sociales y la expresión libre de las emociones.",
         "…el éxito académico y las relaciones afectivas con el docente.",
         "…el amor propio, sin narcisismo, y el respeto por los demás."],
    ok:3, fb:"La autoestima es el equilibrio entre amor propio, sin narcisismo, y respeto por los demás. Sin autoestima hay inseguridad en uno mismo y desconfianza en la sociedad, lo que deteriora la inteligencia emocional." },

  // 4 – SITUACIÓN – correcta C
  { tipo:"Situación en el aula", sit:true,
    txt:"Lee la situación y elige la respuesta que mejor la interpreta:",
    stxt:"La maestra Sofía solicita a sus alumnos que la tarea familiar sea escrita. Pone como condición que la nota debe expresar únicamente pensamientos positivos sobre el alumno, sin mencionar reproches ni regaños. Al recibir las notas, varios niños que normalmente se muestran callados participan con entusiasmo al compartirlas.",
    ops:["La maestra limita la expresión familiar al prohibir cualquier crítica constructiva en la nota.",
         "La maestra comete un error pedagógico al no considerar las dificultades reales de los alumnos.",
         "La maestra aplica correctamente la 'regla de oro' de la tarea familiar: solo pensamientos positivos y armónicos, sin reproches; la comunicación escrita favorece que la familia manifieste afectos, cariños y aprecios, lo que potencia la autoestima del alumno.",
         "La maestra busca únicamente cumplir con el reglamento de entrega de trabajos escolares."],
    ok:2, fb:"La regla de oro de la tarea familiar establece que solo se admiten pensamientos positivos y armónicos, no reproches ni regaños. Presentarla por escrito queda como constancia y se presta a manifestar buenas cualidades, afectos, cariños, ternuras y relaciones armónicas y amorosas." },

  // 5 – correcta A
  { tipo:"Cuestionamiento directo", sit:false,
    txt:"¿Cuál es la razón principal por la que la inequidad de género está 'fuertemente introyectada' en la vida personal y social, según el texto?",
    ops:["Porque es parte de la vida cotidiana en la mayoría de los hogares, lo que la normaliza y dificulta su erradicación.",
         "Porque los programas educativos no incluyen contenidos sobre equidad de género.",
         "Porque los medios de comunicación promueven activamente los estereotipos de género.",
         "Porque las familias se oponen a que la escuela aborde estos temas con sus hijos."],
    ok:0, fb:"El texto señala que el sometimiento y la violencia hacia la mujer, desgraciadamente, es parte de la vida cotidiana en la mayoría de los hogares. No obstante, es posible abrir caminos de solución y esperanza promoviendo el análisis de actitudes que obstaculizan los derechos de niñas y mujeres." },

  // 6 – SITUACIÓN – correcta D
  { tipo:"Situación en el aula", sit:true,
    txt:"Lee la situación y selecciona la interpretación correcta:",
    stxt:"La maestra Carla divide su clase en dos momentos: primero, cada alumno de 6.° grado expone el resultado de la tarea que realizó con su familia (una leyenda local). Segundo, les pide que creen individualmente un poema, dibujo o historia breve sobre lo que más les impactó de ese relato familiar y cómo lo relacionan con vivir con equidad.",
    ops:["La maestra realiza una clase de literatura sin conexión con los valores de la comunidad.",
         "La maestra improvisa porque no tiene material didáctico disponible para esa sesión.",
         "La maestra aplica la primera parte del momento creativo, pero omite la segunda parte esencial.",
         "La maestra desarrolla correctamente el momento creativo en sus dos partes: exposición de la tarea familiar y síntesis personal libre e innovadora donde el alumno expresa sus reflexiones sobre la equidad."],
    ok:3, fb:"El momento creativo tiene dos partes: en la primera los alumnos exponen los resultados de su tarea familiar; en la segunda, mediante una síntesis racional y afectiva, expresan su interpretación personal sobre la historia de su familia, practicando la equidad a través de distintos lenguajes." },

  // 7 – correcta B
  { tipo:"Cuestionamiento directo", sit:false,
    txt:"El texto afirma que la escuela puede superar formas de sometimiento, subordinación e inequidad. ¿A través de qué mecanismo lo logra?",
    ops:["Mediante la aplicación de sanciones disciplinarias a quienes reproduzcan conductas desiguales.",
         "Promoviendo condiciones de dignidad y el fortalecimiento del tejido social y la solidaridad.",
         "Separando a los grupos de alumnos según sus condiciones socioeconómicas para atenderlos mejor.",
         "Implementando programas de becas que compensen las desventajas económicas de las familias."],
    ok:1, fb:"A través de la escuela —en tanto estructura estratégica de la vida social— podemos superar paulatinamente formas de sometimiento, subordinación e inequidad, como la de género, mediante la promoción de condiciones de dignidad y el fortalecimiento del tejido social y la solidaridad." },

  // 8 – SITUACIÓN – correcta A
  { tipo:"Situación en el aula", sit:true,
    txt:"Lee la situación y elige la respuesta más precisa:",
    stxt:"El maestro Rodrigo detecta que Juan, un alumno de 4.° grado, nunca trae la tarea familiar y sus padres no asisten a las reuniones. En lugar de registrar una falta o reducir la calificación de Juan, el maestro le hace preguntas sobre su familia durante las actividades del aula, lo integra en los proyectos grupales y se asegura de que participe activamente sintiéndose valorado.",
    ops:["El maestro actúa correctamente: cuando una familia no responde a la tarea familiar, el docente debe acercarse más al alumno para contrarrestar la ausencia, garantizando que no se sienta solo ni menos apreciado que sus compañeros.",
         "El maestro comete una falta pedagógica al no reportar la situación de Juan a los servicios de apoyo.",
         "El maestro perjudica al grupo al dedicar tiempo extra a Juan en detrimento de los demás alumnos.",
         "El maestro debería sancionar a los padres de Juan por incumplir con las actividades escolares."],
    ok:0, fb:"Cuando alguna familia no responde a la tarea familiar, el docente se acerca más a esas niñas o niños para contrarrestar la ausencia. Es importante no dejarlos solos y que se sientan igualmente apreciados. El maestro no debe ignorar esta situación ni generar diferencias visibles." },

  // 9 – correcta C
  { tipo:"Ordenamiento", sit:false,
    txt:"Ordene correctamente los tres elementos que conforman las secuencias de actividades tal como se describen en el texto:",
    ops:["Momento creativo → Tarea familiar → Actividad inicial.",
         "Tarea familiar → Actividad inicial → Momento creativo.",
         "Actividad inicial → Tarea familiar → Momento creativo.",
         "Actividad inicial → Momento creativo → Tarea familiar."],
    ok:2, fb:"Las secuencias contienen tres elementos en los que los alumnos son centrales: a) la actividad inicial, b) la tarea familiar, y c) el momento creativo. Este orden es fundamental para que la secuencia funcione de forma coherente." },

  // 10 – SITUACIÓN – correcta D
  { tipo:"Situación en el aula", sit:true,
    txt:"Lee la situación y selecciona la interpretación más adecuada:",
    stxt:"La maestra Patricia trabaja en una escuela indígena en Chiapas. Adapta las secuencias usando canciones y refranes en tzotzil aportados por las familias en la tarea familiar. En el momento creativo, los alumnos recrean esas canciones en su lengua materna y también en español, y el colectivo docente guarda estas producciones para integrarlas en un cancionero del ciclo escolar.",

let nombreAlumno="",indiceActual=0,respuestasCorrectas=0,respondida=false;
const letras=["A","B","C","D"];

function iniciarSimulador(){
  const inp=document.getElementById("input-nombre");
  nombreAlumno=inp.value.trim();
  if(!nombreAlumno){inp.style.borderColor="#EF5350";inp.focus();return;}
  inp.style.borderColor="";
  indiceActual=0;respuestasCorrectas=0;respondida=false;
  document.getElementById("pantalla-inicio").style.display="none";
  document.getElementById("pantalla-examen").style.display="block";
  document.getElementById("cab-nombre").textContent=nombreAlumno;
  mostrarPregunta();
}

function mostrarPregunta(){
  respondida=false;
  const p=preguntas[indiceActual],total=preguntas.length;
  document.getElementById("cab-progreso").textContent=`Pregunta ${indiceActual+1} / ${total}`;
  document.getElementById("barra").style.width=`${((indiceActual+1)/total)*100}%`;
  document.getElementById("num-pregunta").textContent=`Pregunta ${indiceActual+1} de ${total}`;
  const wrap=document.getElementById("etiqueta-wrap");
  wrap.innerHTML=`<span class="etiqueta-formato">${p.tipo}</span>`;
  if(p.sit) wrap.innerHTML+=`<span class="etiqueta-situacion">🏫 Situación de aula</span>`;
  document.getElementById("texto-pregunta").innerHTML=p.txt.replace(/\n/g,"<br>");
  const sb=document.getElementById("situacion-box");
  if(p.sit&&p.stxt){sb.style.display="block";sb.innerHTML=`<strong>📌 Situación:</strong> ${p.stxt}`;}
  else{sb.style.display="none";}
  const cont=document.getElementById("opciones");cont.innerHTML="";
  p.ops.forEach((op,i)=>{
    const div=document.createElement("div");div.className="opcion";
    div.innerHTML=`<div class="letra-opcion">${letras[i]}</div><div class="texto-opcion">${op}</div>`;
    div.addEventListener("click",()=>seleccionar(i,div));
    cont.appendChild(div);
  });
  const fb=document.getElementById("feedback");fb.style.display="none";fb.className="feedback";
  document.getElementById("btn-siguiente").style.display="none";
  const t=document.getElementById("tarjeta-pregunta");t.style.animation="none";void t.offsetWidth;t.style.animation="deslizar .4s ease";
}

function seleccionar(idx,elDiv){
  if(respondida)return;respondida=true;
  const p=preguntas[indiceActual];
  document.querySelectorAll(".opcion").forEach(o=>o.classList.add("bloqueada"));
  const fb=document.getElementById("feedback");
  if(idx===p.ok){
    respuestasCorrectas++;elDiv.classList.add("correcta");
    fb.className="feedback correcto";
    fb.innerHTML=`✅ <strong>¡Correcto!</strong> ${p.fb}`;
  } else {
    elDiv.classList.add("incorrecta");
    document.querySelectorAll(".opcion")[p.ok].classList.add("correcta");
    fb.className="feedback incorrecto";
    fb.innerHTML=`❌ <strong>Incorrecto.</strong> ${p.fb}`;
  }
  fb.style.display="block";
  const btn=document.getElementById("btn-siguiente");
  btn.textContent=indiceActual<preguntas.length-1?"Siguiente pregunta →":"Ver mis resultados 🎯";
  btn.style.display="inline-block";
}

function siguientePregunta(){
  indiceActual++;
  if(indiceActual<preguntas.length)mostrarPregunta();else mostrarResultados();
}

function mostrarResultados(){
  document.getElementById("pantalla-examen").style.display="none";
  document.getElementById("pantalla-resultados").style.display="block";
  const total=preguntas.length,inc=total-respuestasCorrectas,pct=Math.round((respuestasCorrectas/total)*100);
  document.getElementById("res-nombre").textContent=nombreAlumno;
  document.getElementById("res-correctas").textContent=respuestasCorrectas;
  document.getElementById("res-incorrectas").textContent=inc;
  document.getElementById("res-pct").textContent=pct+"%";
  document.getElementById("pct-label").textContent=`${respuestasCorrectas} de ${total} preguntas correctas`;
  setTimeout(()=>{document.getElementById("barra-res").style.width=pct+"%";},200);
  let e,m;
  if(pct>=90){e="🏆";m="¡Excelente desempeño! Dominas muy bien los conceptos de equidad educativa. ¡Eres un referente para tu comunidad!";}
  else if(pct>=75){e="🌟";m="¡Muy buen trabajo! Tienes una sólida comprensión del tema. Repasa los conceptos donde tuviste dudas para alcanzar la excelencia.";}
  else if(pct>=60){e="📚";m="Buen esfuerzo. Vas por buen camino. Te recomendamos repasar el material sobre equidad y secuencias de actividades.";}
  else{e="💪";m="¡No te rindas! Cada intento es una oportunidad de aprendizaje. Revisa el contenido con calma y vuelve a intentarlo.";}
  document.getElementById("emoji-res").textContent=e;
  document.getElementById("mensaje-motivador").textContent=m;
}

function reiniciar(){
  document.getElementById("pantalla-resultados").style.display="none";
  document.getElementById("pantalla-inicio").style.display="flex";
  document.getElementById("input-nombre").value="";
}
document.getElementById("input-nombre").addEventListener("keypress",e=>{if(e.key==="Enter")iniciarSimulador();});
</script>
